$!!! - CONTROL SCHEME README
*It is required you configure your Wii Remote with a mapped Classic Controller extension!
*Two schemes are provided: GBAtemp and ACCF: Deluxe. The latter is likely recommended for most users!
*Cursor mode is activated intelligently, but can be forced on/off with the L button.
*Home Menu works as normal, but remember to enable the Cursor with L.
*3C75C28F (float 0.015) sets Cursor speed. You can adjust it between 3C23D70A (0.01) and 3CA3D70A (0.02).
*For extensive typing, it is recommended to connect a real keyboard over using the pointer.

$!!! - CONTROL SCHEME ACCF: DELUXE
*Remote & Nunchuk     Classic Cont.   Game Function
*--------------------------------------------------------------------
*Remote Home          Home            Open/Close Home Menu
*Remote D-Pad Up      D-Pad Up        Change Camera
*Remote D-Pad L/R     D-Pad L/R       Change Tool
*Remote D-Pad Down    D-Pad Down      Put Away Tool
*Remote A             A               Confirm, Action
*Remote B             B               Cancel, Run, Pick Up Item
*Remote Plus          X               Open/Close Map/Next Tab
*Remote Minus         Y               Open/Close Inventory/Prev Tab
*Remote 1             Minus           Take Photo
*Remote 2             Plus            Open/Close Photos
*Remote Pointer       L               Toggle Cursor
*Remote Pointer       Right Stick     Move Cursor
*Nunchuk Stick        Left Stick      Movement
*Nunchuk C            R               Confirm, Action
*Nunchuk Z            ZL/ZR           Cancel, Run, Pick Up Item
*
*Toggle Cursor with L, use Right Stick to control it.
*More information: https://aurumsmods.com/accfdeluxe/classic_controller

$!!! - CONTROL SCHEME GBATEMP
*Remote & Nunchuk     Classic Cont.   Game Function
*--------------------------------------------------------------------
*Remote Home          Home            Open/Close Home Menu
*Remote D-Pad Up      D-Pad Up        Change Camera
*Remote D-Pad L/R     D-Pad L/R       Change Tool
*Remote D-Pad Down    D-Pad Down      Put Away Tool
*Remote A             A               Confirm, Action
*Remote B             B               Cancel, Run, Pick Up Item
*Remote Plus          Plus            Open/Close Map
*Remote Plus          ZR              Next Tab
*Remote Minus         X               Open/Close Inventory
*Remote Minus         ZL              Previous Tab
*Remote 1             Minus           Take Photo
*Remote 2             Y               Open/Close Photos
*Remote Pointer       L               Toggle Cursor
*Remote Pointer       R/L Stick*      Move Cursor
*Nunchuk Stick        Left Stick      Movement
*Nunchuk C            N/A (Use A)     Confirm, Action
*Nunchuk Z            R               Cancel, Run, Pick Up Item
*
*Toggle Cursor with L. R/L Stick to control, depending on code used.
*Right Stick variant allows Cursor movement while walking, but this is not a real advantage and may feel less convenient.
*Left Stick variant uses toggle, likely recommended for most users.
*More information: https://gbatemp.net/threads/new-classic-controller-hacks.659837/post-10507857

